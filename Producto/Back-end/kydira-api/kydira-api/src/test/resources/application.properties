# ====================================================
# CONFIGURACIÓN DE PRUEBAS — reemplaza application.properties durante mvn test
# ====================================================

# H2 en memoria (sin PostgreSQL real)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT (misma clave que producción, válida para pruebas)
jwt.secret=KydiraSecretKeyParaGenerarTokensMuySeguraYDeAlMenos256Bits123456789
jwt.expiration=3600000

# Gemini (clave falsa — todos los tests mockean IGeminiService)
gemini.api.key=fake-api-key-for-tests

# Tamaño máximo de archivo (igual que producción)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Silenciar logs de BD en tests
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN

spring.application.name=kydira-api

# ==============================
# PERFIL
# ==============================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ==============================
# PUERTO DEL SERVIDOR
# Railway entrega PORT automáticamente.
# En local usa 8080.
# ==============================
server.port=${PORT:8080}

# ==============================
# BASE DE DATOS
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# HIKARI
# ==============================
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAXIMUM_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MINIMUM_IDLE:1}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.connection-init-sql=DEALLOCATE ALL

# ==============================
# ARCHIVOS
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==============================
# LOGS
# ==============================
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}

# ==============================
# GOOGLE GEMINI API
# ==============================
gemini.api.key=${GEMINI_API_KEY}

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================
# CORS
# Lo usaremos después cuando conectemos con Vercel.
# ==============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}